---
title: "Taylor Paskett's Blog"
baseURL: "https://taylor.paskett.family/"
theme: "github.com/frjo/hugo-theme-zen/v6"
copyright: 'Copyright © 2024-2026 Taylor Paskett'
languageCode: "en-US"
defaultContentLanguage: "en"
pluralizelisttitles: false
removePathAccents: true
rssLimit: 25
pagination:
  pagerSize: 10
  path: page

markup:
  goldmark:
    parser:
      attribute:
        block: true
    renderer:
      unsafe: true
  highlight:
    style: github

outputFormats:
  SearchIndex:
    mediaType: "application/json"
    baseName: "searchindex"
    isPlainText: true
    notAlternative: true

outputs:
  home: ["HTML","RSS", "JSON", "SearchIndex"]
  section: ["HTML","RSS", "JSON"]

params:
  author:
    name: "Taylor Paskett"
    url: "https://taylor.paskett.family"
  contact: "taylor@paskett.family"
  description: "Taylor Paskett's Blog"
  dateformat: "2006-01-02"
  favicon: "mystic-cactus-3.png"
  feedlinks: true
  icon: "favicon.png"
  image: "mystic-cactus-3.png"
  imageMaxWidth: 400
  logo: true
  logoPath: "mystic-cactus-3.png"
  logoWidth: 64
  logoHeight: 64
  mainSections:
    - blog
  mobileMenu: false
  poweredby: false
  realfavicongenerator: true
  sidebar: false
  submitted: true

languages:
  en:
    weight: 1
    languageName: "English"
    languageCode: "en-US"
    contentDir: content/en
    menu:
      main:
        - Name: "About Me"
          weight: -10
          pageRef: "/"
        - Name: "Blog"
          weight: 2
          pageRef: "/blog/"
        - Name: "Books"
          weight: 6
          pageRef: "/books/"
        - Name: "Apps"
          weight: 8
          pageRef: "/apps/"
        - Name: "Search"
          weight: 10
          pageRef: "/search/"
        - Name: "Contact"
          weight: 12
          pageRef: "/contact/"
